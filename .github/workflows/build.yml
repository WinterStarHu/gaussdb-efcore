name: Build

on:
  push:
    branches:
      - main
      - 'hotfix/**'
      - 'release/**'
    tags:
      - v*
  pull_request:

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    runs-on: ubuntu-24.04

    outputs:
      is_release: ${{ steps.analyze_tag.outputs.is_release }}
      is_prerelease: ${{ steps.analyze_tag.outputs.is_prerelease }}

    env:
      NPGSQL_TEST_POSTGIS: false
      Test__GaussDB__DefaultConnection: Server=localhost;Username=gaussdb;Password=Password@1234;SSL Mode=disable
      Test__GaussDB__EnableExtensionConnectionOption: false

    services:
      opengauss:
        image: opengauss/opengauss:5.0.0
        env:
          GS_PASSWORD: Password@1234
          GS_DB: gaussdb_tests
        ports:
          - 5432:5432
        options: >-
          --name opengauss
          --health-cmd "bash -lc 'export LD_LIBRARY_PATH=/usr/local/opengauss/lib:$LD_LIBRARY_PATH; /usr/local/opengauss/bin/gsql -h 127.0.0.1 -U gaussdb -d gaussdb_tests -W Password@1234 -c \"SELECT 1\" >/dev/null'"
          --health-interval 10s
          --health-timeout 30s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5

      - name: Update openGauss configuration
        run: |
          docker exec opengauss bash -c "sed -i 's/^max_wal_senders\s*=\s*4/max_wal_senders = 80/' /var/lib/opengauss/data/postgresql.conf"
          docker exec opengauss bash -c "sed -i 's/^max_connections\s*=\s*200/max_connections = 500/' /var/lib/opengauss/data/postgresql.conf"
          docker exec opengauss bash -c "cat /var/lib/opengauss/data/postgresql.conf"
          docker restart opengauss
          for i in {1..30}; do
            if docker exec opengauss bash -lc 'export LD_LIBRARY_PATH=/usr/local/opengauss/lib:$LD_LIBRARY_PATH; /usr/local/opengauss/bin/gsql -h 127.0.0.1 -U gaussdb -d gaussdb_tests -W Password@1234 -c "SELECT 1" >/dev/null'; then
              break
            fi
            sleep 1
          done
          docker exec opengauss bash -lc 'export LD_LIBRARY_PATH=/usr/local/opengauss/lib:$LD_LIBRARY_PATH; /usr/local/opengauss/bin/gsql -h 127.0.0.1 -U gaussdb -d gaussdb_tests -W Password@1234 -c "SELECT 1"'
          postgres_exists=$(docker exec opengauss bash -lc 'export LD_LIBRARY_PATH=/usr/local/opengauss/lib:$LD_LIBRARY_PATH; /usr/local/opengauss/bin/gsql -tA -h 127.0.0.1 -U gaussdb -d gaussdb_tests -W Password@1234 -c "SELECT 1 FROM pg_database WHERE datname = '\''postgres'\''"')
          if ! echo "$postgres_exists" | grep -q 1; then
            docker exec opengauss bash -lc 'export LD_LIBRARY_PATH=/usr/local/opengauss/lib:$LD_LIBRARY_PATH; /usr/local/opengauss/bin/gsql -h 127.0.0.1 -U gaussdb -d gaussdb_tests -W Password@1234 -c "CREATE DATABASE postgres OWNER gaussdb;"'
          fi

      - name: Build
        run: dotnet build --configuration Release
        shell: bash

      - name: Test
        run: |
          dotnet test test/EFCore.GaussDB.Tests/EFCore.GaussDB.Tests.csproj -c Release --no-build --no-restore --logger "GitHubActions;report-warnings=false"
          dotnet test test/EFCore.GaussDB.FunctionalTests/EFCore.GaussDB.FunctionalTests.csproj -c Release --no-build --no-restore --filter "FullyQualifiedName~GaussDBDatabaseCreatorExistsTest.Returns_false_when_database_does_not_exist|FullyQualifiedName~GaussDBDatabaseCreatorExistsTest.Returns_true_when_database_exists" --logger "GitHubActions;report-warnings=false"
        shell: bash

      - id: analyze_tag
        name: Analyze tag
        shell: bash
        run: |
          if [[ ${{ github.ref }} =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              echo "Release tag detected"
              echo "::set-output name=is_release::true"
              if [[ ${{ github.ref }} =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+.*- ]]; then
                  echo "Prerelease tag detected"
                  echo "::set-output name=is_prerelease::true"
              fi
          fi

  publish-ci:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.repository, 'npgsql/')
    environment: myget

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5

      - name: Pack
        run: dotnet pack --configuration Release --property:PackageOutputPath="$PWD/nupkgs" --version-suffix "ci.$(date -u +%Y%m%dT%H%M%S)+sha.${GITHUB_SHA:0:9}" -p:ContinuousIntegrationBuild=true

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: EFCore.GaussDB.CI
          path: nupkgs

      - name: Publish packages to MyGet (vnext)
        if: startsWith(github.ref, 'refs/heads/') && startsWith(github.ref, 'refs/heads/hotfix/') == false
        run: dotnet nuget push "*.nupkg" --api-key ${{ secrets.MYGET_FEED_TOKEN }} --source https://www.myget.org/F/npgsql-vnext/api/v3/index.json
        working-directory: nupkgs

      - name: Publish packages to MyGet (patch)
        if: startsWith(github.ref, 'refs/heads/hotfix/')
        run: dotnet nuget push "*.nupkg" --api-key ${{ secrets.MYGET_FEED_TOKEN }} --source https://www.myget.org/F/npgsql/api/v3/index.json
        working-directory: nupkgs

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.repository, 'npgsql/') && needs.build.outputs.is_release == 'true'
    environment: nuget.org

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5

      - name: Pack
        run: dotnet pack --configuration Release --property:PackageOutputPath="$PWD/nupkgs" -p:ContinuousIntegrationBuild=true

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: EFCore.GaussDB.Release
          path: nupkgs

      # TODO: Create a release

      - name: Publish to nuget.org
        run: dotnet nuget push "*.nupkg" --api-key ${{ secrets.NUGET_ORG_API_KEY }} --source https://api.nuget.org/v3/index.json
        working-directory: nupkgs
